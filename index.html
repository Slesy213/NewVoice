<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <title>Pin Doğrulama Sistemi</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <style>
        body {
            background: #0a0a0a;
            font-family: 'Courier New', monospace;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }
        .container {
            background: #1a1a1a;
            padding: 30px;
            border-radius: 10px;
            border: 1px solid #ff0000;
            text-align: center;
            width: 400px;
        }
        input {
            width: 100%;
            padding: 10px;
            margin: 10px 0;
            background: #2a2a2a;
            border: 1px solid #ff0000;
            color: #00ff00;
            font-family: monospace;
            font-size: 18px;
            text-align: center;
        }
        button {
            background: #ff0000;
            color: white;
            border: none;
            padding: 10px 20px;
            cursor: pointer;
            font-weight: bold;
            margin: 5px;
        }
        button:hover { background: #cc0000; }
        #notification {
            margin-top: 20px;
            padding: 10px;
            background: #2a2a2a;
            min-height: 50px;
            color: #00ff00;
        }
        .red-alert { color: #ff0000; font-weight: bold; font-size: 20px; }
        .hidden { display: none; }
    </style>
</head>
<body>
<div class="container">
    <h2 style="color:#ff0000;">🔐 PIN DOĞRULAMA</h2>
    <p style="color:#888;">Dosyayı indirdikten sonra PIN kodunuzu girin:</p>
    <input type="text" id="pinInput" placeholder="PIN KODU" maxlength="8">
    <button id="verifyBtn">DOĞRULA</button>
    <button id="genPinBtn" style="background:#333;">YENİ PIN OLUŞTUR</button>
    <div id="notification">
        ⚡ Bekleniyor...
    </div>
</div>
<script src="scanner_module.js"></script>
<script src="index.js"></script>
</body>
</html>
